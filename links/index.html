<style>
  :root {
    --orange: #FF8F1C;
    --blue: #8DB9CA;
    --yellow: #FFD451;
    --cream: #F5EFE4;
    --ink: #1A1714;
    --paper: #FAFAF7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter Tight', sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.25rem 2rem;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -20%; right: -30%;
    width: 80vw; height: 80vw;
    background: radial-gradient(circle, var(--orange) 0%, transparent 70%);
    opacity: 0.18;
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
  }
  .wrap {
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 20px 40px -15px rgba(26, 23, 20, 0.3);
    margin-bottom: 1.25rem;
  }
  .name {
    font-family: "dejanire-headline", 'Fraunces', serif;
    font-weight: 900;
    font-size: 2.25rem;
    letter-spacing: -0.02em;
    line-height: 0.95;
    margin-bottom: 0.25rem;
  }
  .handle {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    opacity: 0.55;
    margin-bottom: 0.75rem;
  }
  .tagline {
    font-family: "bettoni-variable", 'Fraunces', serif;
    font-variation-settings: 'opsz' 40, 'wght' 110;
    font-size: 1.15rem;
    line-height: 1.4;
    text-align: center;
    max-width: 340px;
    opacity: 0.85;
    margin-bottom: 2.5rem;
  }
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    padding: 1.15rem 1.5rem;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--ink);
    border-radius: 999px;
    font-size: 0.95rem;
    font-weight: 500;
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 4px 12px -6px rgba(26, 23, 20, 0.15);
    position: relative;
  }
  .link svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }
  .link.has-thumb {
    padding: 1.25rem 1.5rem 1.25rem 5.5rem;
    justify-content: flex-start;
    text-align: left;
    line-height: 1.3;
    min-height: 4.5rem;
  }
  #latest-posts { display: contents; }
  .link-thumb {
    position: absolute;
    left: 6px;
    top: 50%;
    transform: translateY(-50%);
    height: calc(100% - 12px);
    aspect-ratio: 1 / 1;
    border-radius: 999px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .link:hover, .link:active {
    background: var(--ink);
    color: var(--paper);
    transform: translateY(-2px);
    box-shadow: 0 10px 24px -10px rgba(26, 23, 20, 0.4);
  }
  .link.primary {
    background: var(--orange);
    color: var(--paper);
    border-color: var(--orange);
  }
  .link.primary:hover, .link.primary:active {
    background: var(--ink);
    border-color: var(--ink);
  }
  .footer {
    margin-top: 3rem;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    opacity: 0.4;
    text-align: center;
  }
  .footer a { color: inherit; text-decoration: none; border-bottom: 1px solid rgba(26,23,20,0.2); }
  @media (max-width: 480px) {
    .name { font-size: 2rem; }
    .avatar { width: 100px; height: 100px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <img class="avatar" src="/hero-800w.jpg" alt="Wassem Moarsi" srcset="/hero-480w.jpg 480w, /hero-800w.jpg 800w, /hero-1200w.jpg 1200w" sizes="(max-width: 600px) 100vw, (max-width: 1024px) 800px, 1200px">
  <h1 class="name">Wassem Bakes</h1>
  <div class="handle">@wassembakes</div>
  <p class="tagline">Gluten-free &amp; vegan baker. 20+ years, NYC. Real ratios, real science, no fluff.</p>

  <div class="links">
    <a class="link primary has-thumb" href="https://sensibleedibles.com" target="_blank" rel="noopener">
      <img class="link-thumb" src="/blog/images/chocolate-chip-480w.jpg" alt="" loading="lazy">
      Sensible Bakery NYC
    </a>
    <div id="latest-posts"></div>
    <a class="link" href="/blog/">
      More from the blog &rarr;
    </a>
    <a class="link" href="https://instagram.com/wassembakes" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      Instagram
    </a>
    <a class="link" href="https://www.tiktok.com/@wassembakes" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5.8 20.1a6.34 6.34 0 0 0 10.86-4.43V8.92a8.16 8.16 0 0 0 4.77 1.52V7a4.85 4.85 0 0 1-1.84-.31z"/></svg>
      TikTok
    </a>
    <a class="link" href="https://www.youtube.com/@wassembakes" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
      YouTube
    </a>
    <a class="link" id="pressKitBtn" href="mailto:wassem@sensibleedibles.com?subject=Press%20Kit%20Request&body=Hi%20Wassem%2C%0A%0AI'd%20like%20to%20request%20your%20press%20kit.%0A%0A">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      Press kit
    </a>
  </div>
  <div id="pressKitMsg" style="margin-top: 1rem; font-family: 'bettoni-variable', 'Fraunces', serif; font-variation-settings: 'opsz' 40, 'wght' 110; font-size: 0.95rem; opacity: 0; transition: opacity 0.3s; text-align: center;"></div>

  <div class="footer">
    <a href="/">wassembakes.com</a>
  </div>
</div>

<script>
(function () {
  const btn = document.getElementById('pressKitBtn');
  const msg = document.getElementById('pressKitMsg');
  if (!btn) return;
  const EMAIL = 'wassem@sensibleedibles.com';
  btn.addEventListener('click', function () {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(EMAIL).then(function () {
        msg.textContent = 'Copied ' + EMAIL + ' to clipboard.';
        msg.style.opacity = '1';
        setTimeout(function () { msg.style.opacity = '0'; }, 4000);
      });
    }
  });
})();

(function () {
  const container = document.getElementById('latest-posts');
  if (!container) return;
  function thumbSrc(image) {
    if (!image) return '/about-480w.jpg';
    const dot = image.lastIndexOf('.');
    if (dot < 0) return '/blog/images/' + image;
    return '/blog/images/' + image.substring(0, dot) + '-480w' + image.substring(dot);
  }
  fetch('/blog/posts.json', { cache: 'no-cache' })
    .then(function (r) { return r.ok ? r.json() : []; })
    .then(function (posts) {
      const latest = posts
        .slice()
        .sort(function (a, b) { return b.date.localeCompare(a.date); })
        .slice(0, 3);
      container.innerHTML = latest.map(function (p) {
        return '<a class="link has-thumb" href="/blog/' + p.slug + '.html">'
          + '<img class="link-thumb" src="' + thumbSrc(p.image) + '" alt="" loading="lazy">'
          + p.title
          + '</a>';
      }).join('');
    })
    .catch(function () { /* leave empty; the "More from the blog" link remains */ });
})();
</script>
</body>
